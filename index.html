<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokelixo Classes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;

        h1 {
            color: #333;
        }

            list-style-type: none;

        }
    </style>
</head>
<body>
    <h1>Pokelixo Classes</h1>

        <li><a href="#warrior">Warrior</a></li>

        <li><a href="#archer">Archer</a></li>

</html>
